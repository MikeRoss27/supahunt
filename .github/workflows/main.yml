name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Syntax check
        run: |
          python -m py_compile supahunt.py
          for f in modules/*.py; do python -m py_compile "$f"; done

      - name: Flake8 (warnings only)
        run: flake8 --max-line-length=120 --count --statistics --exit-zero .
